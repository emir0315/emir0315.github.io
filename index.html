<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Emir 的遊戲世界</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 Emir 的遊戲世界</h1>

<button onclick="toggleDarkMode()">🌙 夜間模式</button>
<button onclick="toggleMusic()">🎵 音樂開關</button>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- Minecraft -->
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png">
        <h2>Minecraft</h2>
        <p>自由沙盒建築遊戲</p>
        <button onclick="showMore(this)">查看更多</button>
        <button onclick="likeGame(this)">❤️ 喜歡 (<span>0</span>)</button>

        <div class="rating">
            ⭐⭐⭐⭐⭐
        </div>

        <p class="more hidden">
            可以建築、生存、探險，和朋友連線超好玩！
        </p>
    </div>

    <!-- Roblox -->
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg">
        <h2>Roblox</h2>
        <p>超多玩家創作的遊戲平台</p>
        <button onclick="showMore(this)">查看更多</button>
        <button onclick="likeGame(this)">❤️ 喜歡 (<span>0</span>)</button>

        <div class="rating">
            ⭐⭐⭐⭐☆
        </div>

        <p class="more hidden">
            可以自己做遊戲，也可以玩別人做的！
        </p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的超酷個人網頁</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🚀 Emir 的超酷世界</h1>
    <p>歡迎來到我的升級版網站！</p>
  </header>

  <div class="container">

    <section>
      <h2>🧑‍💻 關於我</h2>
      <div class="card">
        <p>我是一名學生，喜歡 Tomica 🚗 和樂高 🧱！</p>
      </div>
    </section>

    <section>
      <h2>🎯 我的收藏</h2>
      <div class="gallery">
        <img src="https://via.placeholder.com/150" alt="car">
        <img src="https://via.placeholder.com/150" alt="lego">
        <img src="https://via.placeholder.com/150" alt="toy">
      </div>
    </section>

    <section>
      <h2>🎮 小遊戲：點擊加分</h2>
      <div class="card center">
        <p>分數：<span id="score">0</span></p>
        <button onclick="addScore()">+1 分</button>
      </div>
    </section>

    <section>
      <h2>👋 打招呼</h2>
      <div class="card center">
        <button onclick="sayHello()">點我 👋</button>
      </div>
    </section>

  </div>

  <footer>
    <p>✨ Emir 的超酷網站 ✨</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
